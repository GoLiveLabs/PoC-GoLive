<div class="camera-card">
  <div class="camera-card__header">
    <span class="camera-card__name">{{ camera().name }}</span>
    <span
      class="badge"
      [class.badge--online]="camera().status === 'online'"
      [class.badge--offline]="camera().status === 'offline'"
    >
      {{ camera().status === 'online' ? 'Online' : 'Offline' }}
    </span>
  </div>

  <div class="camera-card__preview">
    <span class="camera-card__preview-placeholder">Pré-visualização indisponível</span>
  </div>

  <button
    type="button"
    class="camera-card__preview-btn"
    [disabled]="camera().status === 'offline'"
    (click)="onPreview()"
  >
    Colocar em prévia
  </button>

  <label class="camera-card__assignment">
    Posição
    <select
      class="camera-card__select"
      [disabled]="camera().status === 'offline'"
      [value]="currentPositionId()"
      (change)="onAssignmentChange($any($event.target).value)"
    >
      <option [value]="noneOption">Nenhuma</option>
      @for (position of positions(); track position.id) {
        <option [value]="position.id">{{ position.name }}</option>
      }
    </select>
  </label>
</div>
