@if (cameras().length === 0) {
  <p class="camera-grid__empty">Nenhuma câmera detectada ainda.</p>
} @else {
  <div class="camera-grid">
    @for (camera of cameras(); track camera.id) {
      <app-camera-card
        [camera]="camera"
        [positions]="positions()"
        (assign)="assign.emit($event)"
        (unassign)="unassign.emit($event)"
      />
    }
  </div>
}
