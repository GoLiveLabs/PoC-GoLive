<div class="app-shell">
  <app-control-bar
    [positions]="ws.positions()"
    [connectionState]="ws.connectionState()"
    (sync)="onSync()"
  />

  @if (ws.lastError()) {
    <div class="toast toast--error" role="alert">
      <span>{{ ws.lastError() }}</span>
      <button type="button" (click)="dismissError()">×</button>
    </div>
  }

  @if (ws.connectionState() !== 'open') {
    <div class="toast toast--warning" role="status">
      <span>Sem conexão com o backend. Tentando reconectar...</span>
    </div>
  }

  <main class="app-shell__content">
    <app-live-control
      [cameras]="ws.cameras()"
      [scenes]="ws.scenes()"
      [liveState]="ws.liveState()"
      (previewSelect)="onPreviewSelect($event)"
      (cut)="onCut()"
    />

    <app-broadcast
      [clients]="clients()"
      [status]="ws.broadcastStatus()"
      [onAir]="(ws.liveState()?.liveKind ?? '') !== ''"
      (setActiveClient)="onSetActiveClient($event)"
      (start)="onStartBroadcast()"
      (stop)="onStopBroadcast()"
      (restart)="onRestartDestination($event)"
    />

    <app-scene-admin
      [scenes]="ws.scenes()"
      [positions]="ws.positions()"
      [liveState]="ws.liveState()"
      (create)="onCreateScene($event)"
      (rename)="onRenameScene($event)"
      (updatePositions)="onUpdateScenePositions($event)"
      (delete)="onDeleteScene($event)"
    />

    <app-position-admin
      [positions]="ws.positions()"
      [cameras]="ws.cameras()"
      (create)="onCreatePosition($event)"
      (rename)="onRenamePosition($event)"
      (delete)="onDeletePosition($event)"
      (setAudio)="onSetAudioSource($event)"
    />

    <app-camera-grid
      [cameras]="ws.cameras()"
      [positions]="ws.positions()"
      (assign)="onAssignCamera($event)"
      (unassign)="onUnassignCamera($event)"
      (preview)="onPreviewCamera($event)"
    />
  </main>
</div>
