name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Validate tag matches vMAJOR.MINOR.PATCH
        run: |
          TAG="${GITHUB_REF_NAME}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match required vMAJOR.MINOR.PATCH format"
            exit 1
          fi
      - name: go vet and test
        run: go vet ./... && go test ./...
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: docker build -t ghcr.io/golivelabs/golive-backend:${GITHUB_REF_NAME} .
      - name: Push image
        run: docker push ghcr.io/golivelabs/golive-backend:${GITHUB_REF_NAME}