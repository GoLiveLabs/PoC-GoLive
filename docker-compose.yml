services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"
      - "8554:8554"
      - "9997:9997"
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  backend:
    image: ghcr.io/golivelabs/golive-backend:latest
    environment:
      HTTP_ADDR: ":8080"
      OBS_ADDR: "host.docker.internal:4455"
      OBS_PASSWORD: ""
      MEDIAMTX_API_URL: "http://mediamtx:9997"
      MEDIA_SOURCE_BASE_URL: "rtmp://mediamtx:1935"
      API_TOKEN: "dev-token"
      SYNC_INTERVAL: "3s"
      PROGRAM_SCENE: "Program"
      LOG_LEVEL: "info"
    ports:
      - "8080:8080"
    depends_on:
      - mediamtx
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: ghcr.io/golivelabs/golive-frontend:latest
    ports:
      - "4200:4200"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend