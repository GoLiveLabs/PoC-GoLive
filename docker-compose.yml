services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"     # RTMP ingest
      - "8554:8554"     # RTSP
      - "8890:8890/udp" # SRT
      - "9997:9997"     # API HTTP
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: live_orchestrator
    ports:
      - "5433:5432" # host 5433: 5432 is often already taken by another local Postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
